name: CI

# Verification gates for every push to main and every pull request.
# Verify-only: no artifacts are uploaded here (release/bindings pipelines own that).
#
# Runs on windows-latest because Textree is Windows-first (Tauri + WebView2) today.
# Multi-OS CI is deferred until the cross-platform debt is addressed (see ROADMAP §3 / D6).
#
# The Playwright E2E suite is intentionally NOT run in CI: it attaches over CDP to a
# live WebView2 of the running Tauri app, which needs a GUI session. E2E stays a
# local/manual gate (see e2e/README.md).

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Type check (svelte-check, 0 errors / 0 warnings)
        run: npm run check

      - name: Unit tests (vitest)
        run: npm run test:unit

      - name: Build frontend (vite, adapter-static)
        run: npm run build

      # cargo test builds the Tauri crate, whose tauri.conf.json bundle.resources
      # requires BOTH resources/canopy AND resources/host to exist — otherwise the
      # build script fails with "resource path doesn't exist". Assemble both sidecars
      # before cargo, mirroring release.yml (without that step this job was permanently red).
      - name: Checkout canopy (pinned)
        uses: actions/checkout@v4
        with:
          repository: iyulab/canopy
          ref: 26bb78813a6bbfe420d2405f88f88e5015f9f263 # pin; keep in sync with release.yml
          path: canopy-src

      - name: Assemble canopy sidecar
        shell: pwsh
        run: pwsh -NoProfile -File scripts/assemble-canopy-sidecar.ps1 -CanopyPath ${{ github.workspace }}/canopy-src

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Assemble host sidecar
        shell: pwsh
        run: pwsh -NoProfile -File scripts/assemble-host-sidecar.ps1

      - name: Rust tests (cargo)
        run: cargo test --manifest-path src-tauri/Cargo.toml
