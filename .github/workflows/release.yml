name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: windows-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Speeds up recurring builds. cache-on-failure saves the cache even when the job fails, so a
      # cold first run that overruns the Key Vault token TTL (~60-90 min) recovers fast on re-trigger.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      # Acquire canopy at a pinned commit so the sidecar payload is reproducible.
      # Bump the ref deliberately when picking up new canopy features.
      - name: Checkout canopy (pinned)
        uses: actions/checkout@v4
        with:
          repository: iyulab/canopy
          ref: 26bb78813a6bbfe420d2405f88f88e5015f9f263 # pin; bump deliberately
          path: canopy-src

      # Builds canopy and copies the output into src-tauri/resources/canopy/
      # so tauri-action bundles it in the installer (Task 3 resources map).
      - name: Assemble canopy sidecar
        shell: pwsh
        run: pwsh -NoProfile -File scripts/assemble-canopy-sidecar.ps1 -CanopyPath ${{ github.workspace }}/canopy-src

      # Guard: runs the gated integration test (Task 4) to confirm the assembled
      # payload is complete before the build + sign step consumes it.
      - name: Verify bundled sidecar publishes
        run: cargo test --manifest-path src-tauri/Cargo.toml -- --ignored run_publish_via_assembled_sidecar

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: 293d5452-469f-4988-93c9-0aee0f2d0846
          tenant-id: 66683f75-fa9e-4325-84e1-9253c1fc8cb7
          allow-no-subscriptions: true

      - name: Install AzureSignTool
        run: dotnet tool install --global AzureSignTool

      - name: Acquire Key Vault access token
        shell: pwsh
        run: |
          $token = az account get-access-token --resource https://vault.azure.net --query accessToken -o tsv
          echo "::add-mask::$token"
          echo "AZURE_KV_TOKEN=$token" >> $env:GITHUB_ENV

      - name: Build, sign, and release
        uses: tauri-apps/tauri-action@v0
        env:
          AZURE_KV_URL: https://kv-codesign-iyulab.vault.azure.net/
          AZURE_KV_CERT: globalsign-ev-codesign
          AZURE_TIMESTAMP_URL: http://timestamp.globalsign.com/tsa/r6advanced1
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: '.'
          tagName: ${{ github.ref_name }}
          releaseName: 'Textree ${{ github.ref_name }}'
          releaseDraft: true  # GitHub "latest" excludes drafts; auto-update sees this only after a human publishes
          prerelease: false
          args: --target x86_64-pc-windows-msvc
